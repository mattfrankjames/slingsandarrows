<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <title>Slings & Arrows | Offline</title>
  <link rel="preconnect" href="https://use.typekit.net">
  <link rel="stylesheet" href="https://use.typekit.net/nwv0ezl.css">
  <link rel="stylesheet" href="https://use.typekit.net/bro0tvr.css">
  <link href="../styles/tailwind.css" rel="stylesheet">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='50%' x='50%' dy='.35em' text-anchor='middle' font-size='90'>*</text></svg>">
  <style>
    .offline-container {
      text-align: center;
      padding: 2em 1em;
      max-width: 480px;
      margin: 0 auto;
    }
    .offline-icon {
      font-size: 4rem;
      display: block;
      margin-block-end: 0.5em;
      opacity: 0.6;
    }
    .offline-title {
      font-family: "fatfrank", sans-serif;
      text-transform: uppercase;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      margin-block-end: 0.5em;
    }
    .offline-body {
      opacity: 0.7;
      line-height: 1.7;
      margin-block-end: 1.5em;
    }
    .btn {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.45);
      color: white;
      font-family: "ballinger-mono", sans-serif;
      font-size: 1rem;
      padding: 0.6em 1.5em;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.2s;
      letter-spacing: -0.05ch;
      text-decoration: none;
      display: inline-block;
    }
    .btn:hover { background: rgba(255, 255, 255, 0.22); }
  </style>
</head>
<body>
  <div class="wrapper min-h-screen">
    <header class="p-4 text-white">
      <h1 class="glitch">
        <a href="/">
          <span aria-hidden="true">Slings & Arrows</span>
          Slings & Arrows
          <span aria-hidden="true">Slings & Arrows</span>
        </a>
      </h1>
    </header>
    <main class="p-4" id="main-content">
      <div class="offline-container">
        <span class="offline-icon" aria-hidden="true">📡</span>
        <h2 class="offline-title">You're offline</h2>
        <p class="offline-body">
          No network connection right now. Check your signal and try again —
          the band will still be here when you get back.
        </p>
        <a href="/" class="btn" id="retry-btn">Try Again</a>
      </div>
    </main>
    <footer class="p-4 text-white text-center">
      <p>&copy; <script>document.write(new Date().getFullYear())</script> Slings & Arrows</p>
    </footer>
  </div>
  <script>
    document.getElementById('retry-btn').addEventListener('click', e => {
      e.preventDefault();
      window.location.reload();
    });

    // Auto-retry when connectivity is restored
    window.addEventListener('online', () => {
      window.location.href = document.referrer || '/';
    });
  </script>
</body>
</html>
