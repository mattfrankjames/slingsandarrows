<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Maskable icon — the entire canvas is the "safe zone background".
    The glyph must stay within the inner 80 % circle (r ≈ 205 px from centre).
    Full-bleed solid fill ensures no white/transparent bleed on any mask shape.
  -->
  <rect width="512" height="512" fill="#000000"/>
  <text
    x="256" y="256"
    dy=".35em"
    text-anchor="middle"
    font-size="270"
    fill="white"
    font-family="Georgia, serif"
    font-weight="bold"
  >*</text>
</svg>
