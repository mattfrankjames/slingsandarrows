<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background — slightly off-black with enough contrast to read against dark browser chrome -->
  <rect width="100" height="100" fill="#1a1a1a" rx="18"/>

  <!-- Asterisk: 6 lines radiating from center, bold & edge-to-edge -->
  <g stroke="#ffffff" stroke-width="12" stroke-linecap="round">
    <!-- Vertical -->
    <line x1="50" y1="8" x2="50" y2="92"/>
    <!-- 60° (upper-right → lower-left) -->
    <line x1="83.64" y1="17" x2="16.36" y2="83"/>
    <!-- 120° (upper-left → lower-right) -->
    <line x1="16.36" y1="17" x2="83.64" y2="83"/>
  </g>
</svg>
