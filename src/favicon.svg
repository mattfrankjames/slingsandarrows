<svg width="512" height="512" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#1a1030"></stop>
      <stop offset="100%" stop-color="#0a0714"></stop>
    </radialGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#bg)"></rect>

  <!-- Cyan chromatic-aberration layer -->
  <g transform="translate(-2.6,0)">
    <polyline points="24,66 50,30 76,66" fill="none" stroke="#2fe6ff" stroke-width="11" opacity="0.85" stroke-linejoin="miter"></polyline>
    <polyline points="24,90 50,54 76,90" fill="none" stroke="#2fe6ff" stroke-width="11" opacity="0.85" stroke-linejoin="miter"></polyline>
  </g>

  <!-- Magenta chromatic-aberration layer -->
  <g transform="translate(2.6,0)">
    <polyline points="24,66 50,30 76,66" fill="none" stroke="#ff2fb9" stroke-width="11" opacity="0.85" stroke-linejoin="miter"></polyline>
    <polyline points="24,90 50,54 76,90" fill="none" stroke="#ff2fb9" stroke-width="11" opacity="0.85" stroke-linejoin="miter"></polyline>
  </g>

  <!-- Glow layer (inline opacity instead of filter — iOS-safe) -->
  <g opacity="0.55">
    <polyline points="24,66 50,30 76,66" fill="none" stroke="#f7f2ff" stroke-width="15" stroke-linejoin="miter"></polyline>
    <polyline points="24,90 50,54 76,90" fill="none" stroke="#f7f2ff" stroke-width="15" stroke-linejoin="miter"></polyline>
  </g>

  <!-- White top layer -->
  <g>
    <polyline points="24,66 50,30 76,66" fill="none" stroke="#f7f2ff" stroke-width="11" stroke-linejoin="miter"></polyline>
    <polyline points="24,90 50,54 76,90" fill="none" stroke="#f7f2ff" stroke-width="11" stroke-linejoin="miter"></polyline>
  </g>
</svg>
