<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background -->
  <rect width="64" height="64" fill="#0d0d0d"/>
  <!-- Bold "S" glyph, left half -->
  <g fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- S: top cap → top-right curve → mid-left → bottom-right → bottom cap -->
    <path d="M 26 10 Q 10 10 10 20 Q 10 30 22 30 Q 34 30 34 40 Q 34 52 18 52"/>
  </g>
  <!-- Bold "A" glyph, right half -->
  <g fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- A: left leg, right leg, crossbar -->
    <path d="M 38 52 L 48 10 L 58 52"/>
    <line x1="42" y1="36" x2="54" y2="36"/>
  </g>
</svg>
