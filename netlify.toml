[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Clean URLs
[[redirects]]
  from = "/posts"
  to = "/posts.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/instruments"
  to = "/instruments.html"
  status = 200

[[redirects]]
  from = "/bass-sequencer"
  to = "/bass-sequencer.html"
  status = 200

[[redirects]]
  from = "/community"
  to = "/board.html"
  status = 200

[[redirects]]
  from = "/api/board/threads/delete"
  to = "/.netlify/functions/board-delete-thread"
  status = 200

[[redirects]]
  from = "/api/board/replies/delete"
  to = "/.netlify/functions/board-delete-reply"
  status = 200
