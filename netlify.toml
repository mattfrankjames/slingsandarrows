[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Clean URLs
[[redirects]]
  from = "/posts"
  to = "/posts.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/offline"
  to = "/offline.html"
  status = 200

# PWA share_target handler — redirect to the composer
[[redirects]]
  from = "/share"
  to = "/app.html"
  status = 200
