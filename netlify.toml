[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Clean URLs
[[redirects]]
  from = "/feed"
  to = "/feed.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/studio"
  to = "/studio.html"
  status = 200

[[redirects]]
  from = "/bass-sequencer"
  to = "/studio"
  status = 301

[[redirects]]
  from = "/shows"
  to = "/shows.html"
  status = 200

[[redirects]]
  from = "/community"
  to = "/community.html"
  status = 200

[[redirects]]
  from = "/gallery"
  to = "/gallery.html"
  status = 200

[[redirects]]
  from = "/board"
  to = "/community"
  status = 301

[[redirects]]
  from = "/posts"
  to = "/feed"
  status = 301

# RSS feed clean URLs
[[redirects]]
  from = "/feed.xml"
  to = "/api/rss/feed"
  status = 200

[[redirects]]
  from = "/community.xml"
  to = "/api/rss/community"
  status = 200

[[headers]]
  for = "/api/rss/*"
  [headers.values]
    Content-Type = "application/rss+xml; charset=utf-8"

# ── Cache headers ─────────────────────────────────────────────────────────────

# Hashed static assets (Parcel appends a content hash) — safe to cache forever
[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML files — short CDN cache, always revalidate so users get fresh pages
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# API responses — never cache at the CDN edge (service worker handles offline)
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Service worker — must never be cached so updates roll out immediately
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

