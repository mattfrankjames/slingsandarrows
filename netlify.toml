[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Clean URLs
[[redirects]]
  from = "/feed"
  to = "/feed.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/studio"
  to = "/studio.html"
  status = 200

[[redirects]]
  from = "/bass-sequencer"
  to = "/studio"
  status = 301

[[redirects]]
  from = "/shows"
  to = "/shows.html"
  status = 200

[[redirects]]
  from = "/community"
  to = "/community.html"
  status = 200

[[redirects]]
  from = "/gallery"
  to = "/gallery.html"
  status = 200

[[redirects]]
  from = "/board"
  to = "/community"
  status = 301

[[redirects]]
  from = "/posts"
  to = "/feed"
  status = 301

# RSS feed clean URLs
[[redirects]]
  from = "/feed.xml"
  to = "/api/rss/feed"
  status = 200

[[redirects]]
  from = "/community.xml"
  to = "/api/rss/community"
  status = 200

[[headers]]
  for = "/api/rss/*"
  [headers.values]
    Content-Type = "application/rss+xml; charset=utf-8"

