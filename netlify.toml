[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Clean URLs
[[redirects]]
  from = "/feed"
  to = "/feed.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/instruments"
  to = "/instruments.html"
  status = 200

[[redirects]]
  from = "/bass-sequencer"
  to = "/bass-sequencer.html"
  status = 200

[[redirects]]
  from = "/shows"
  to = "/shows.html"
  status = 200

[[redirects]]
  from = "/community"
  to = "/community.html"
  status = 200

[[redirects]]
  from = "/board"
  to = "/community"
  status = 301

[[redirects]]
  from = "/posts"
  to = "/feed"
  status = 301

[[redirects]]
  from = "/api/board/threads/delete"
  to = "/.netlify/functions/board-delete-thread"
  status = 200

[[redirects]]
  from = "/api/board/replies/delete"
  to = "/.netlify/functions/board-delete-reply"
  status = 200
