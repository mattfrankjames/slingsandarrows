[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# /api/* → Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Clean URLs
[[redirects]]
  from = "/posts"
  to = "/posts.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200
